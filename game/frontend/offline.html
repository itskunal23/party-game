<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>GFY — Offline</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      background: #0033A0;
      font-family: 'Nunito', sans-serif;
      color: white;
      text-align: center;
      padding: 32px;
    }
    h1 { font-size: 2.5rem; margin-bottom: 16px; }
    p  { font-size: 1.1rem; opacity: 0.85; max-width: 300px; line-height: 1.5; }
    button {
      margin-top: 32px;
      background: white;
      color: #0033A0;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      padding: 14px 32px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🐟 You're offline</h1>
  <p>Looks like Gary cut the wifi. Check your connection and try again.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
